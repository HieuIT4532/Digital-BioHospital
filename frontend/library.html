<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thư Viện Sinh Học Thông Minh – Digital BioHospital</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    /* ── Search & Filter ── */
    .search-bar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.5rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0, 242, 255, 0.2);
      border-radius: 999px; margin-bottom: 2rem; transition: all 0.3s;
    }
    .search-bar:focus-within { border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
    .search-bar input { flex:1; background:none; border:none; outline:none; padding: 1rem 0; color: white; font-size: 1rem; }

    .filter-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:2rem; justify-content: center; }
    .filter-btn {
      padding: 0.5rem 1.2rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; cursor:pointer; font-size:0.85rem; color: rgba(255,255,255,0.6); transition: 0.3s;
    }
    .filter-btn.active { background: #00f2ff; color: #000; font-weight: bold; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

    /* ── Grid ── */
    .library-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap:2rem; }
    .lib-card {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 1.5rem; padding: 2rem; cursor: pointer; transition: 0.4s; position: relative; overflow: hidden;
      backdrop-filter: blur(5px);
    }
    .lib-card:hover { transform: translateY(-10px); border-color: #00f2ff; background: rgba(0, 242, 255, 0.05); }
    .lib-card .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .lib-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #00f2ff; }
    .lib-card p { font-size: 0.9rem; color: rgba(255,255,255,0.5); line-height: 1.6; }

    /* ── Modal & Detail ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
      z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
    }
    .modal-overlay.open { display: flex; opacity: 1; }
    .modal-content {
      width: 90vw; max-width: 900px; max-height: 85vh; background: #0a0f18; border: 1px solid rgba(0, 242, 255, 0.2);
      border-radius: 2rem; position: relative; display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 2rem; overflow-y: auto; flex-grow: 1; }

    .wiki-btn {
        background: #fff; color: #000; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: bold; font-size: 0.8rem;
        display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem; transition: 0.3s;
    }
    .wiki-btn:hover { background: #00f2ff; transform: scale(1.05); }

    /* ── Quiz ── */
    .quiz-section { background: rgba(0, 242, 255, 0.05); border: 1px dashed #00f2ff; border-radius: 1rem; padding: 2rem; margin-top: 2rem; }
    .quiz-option {
        width: 100%; text-align: left; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; transition: 0.2s;
    }
    .quiz-option:hover { background: rgba(0, 242, 255, 0.1); border-color: #00f2ff; }
    .quiz-option.correct { background: rgba(16, 185, 129, 0.2); border-color: #10B981; }
    .quiz-option.wrong { background: rgba(239, 68, 68, 0.2); border-color: #EF4444; }

  </style>
</head>
<body class="page-enter">

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="navbar-brand">🏥 Digital BioHospital</a>
      <ul class="navbar-nav">
        <li><a href="index.html">🏠 Trang chủ</a></li>
        <li><a href="departments.html">🏥 Lâm Sàng</a></li>
        <li><a href="metabolism.html">🔬 Phòng Lab</a></li>
        <li><a href="genetics.html">🧬 Di Truyền</a></li>
        <li><a href="library.html" class="active">📚 Thư Viện</a></li>
      </ul>
    </div>
  </nav>

  <main class="container" style="padding-top: 5rem;">
    <div class="page-header text-center">
      <div class="section-tag">Medical Library</div>
      <h1>📚 Thư Viện Y Khoa AI</h1>
      <p>Kho tàng kiến thức Sinh học 10, 11, 12 được chuẩn hóa theo SGK & Wikipedia.</p>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Tìm kiếm kiến thức: DNA, Ti thể, Neuron..." oninput="filterLibrary()" />
    </div>

    <div class="filter-tabs">
      <button class="filter-btn active" data-grade="all" onclick="setFilter('all')">Tất cả</button>
      <button class="filter-btn" data-grade="10" onclick="setFilter('10')">Lớp 10 (Vi mô)</button>
      <button class="filter-btn" data-grade="11" onclick="setFilter('11')">Lớp 11 (Vĩ mô)</button>
      <button class="filter-btn" data-grade="12" onclick="setFilter('12')">Lớp 12 (Di truyền)</button>
    </div>

    <div class="library-grid" id="library-grid">
      <!-- Cards populated by JS -->
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title" style="color: #00f2ff;">Tiêu đề</h2>
        <button onclick="closeModal()" style="color: #fff; font-size: 1.5rem;">✕</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Content -->
      </div>
    </div>
  </div>

  <script src="js/patient.js"></script>
  <script>
    const KNOWLEDGE_BASE = [
      {
        id: "mitochondria",
        grade: "10",
        title: "Ti thể (Mitochondria)",
        icon: "⚡",
        excerpt: "Nhà máy năng lượng của tế bào, nơi diễn ra hô hấp tế bào tạo ATP.",
        wiki: "https://vi.wikipedia.org/wiki/Ti_thể",
        details: "Ti thể là bào quan có hai lớp màng bao bọc. Màng ngoài trơn nhẵn, màng trong gấp nếp tạo thành các mào (cristae). Đây là nơi chứa các enzyme hô hấp thực hiện chu trình Krebs và chuỗi truyền electron để tạo ra ATP - đồng tiền năng lượng của sự sống.",
        quiz: {
            question: "Cấu trúc nào của ti thể giúp tăng diện tích bề mặt để chứa enzyme hô hấp?",
            options: ["Màng ngoài", "Mào (Cristae)", "Chất nền", "DNA ti thể"],
            answer: 1
        }
      },
      {
        id: "cell_membrane",
        grade: "10",
        title: "Màng sinh chất",
        icon: "🛡️",
        excerpt: "Cấu trúc khảm động điều khiển sự trao đổi chất giữa tế bào và môi trường.",
        wiki: "https://vi.wikipedia.org/wiki/Màng_sinh_chất",
        details: "Màng sinh chất cấu tạo từ lớp kép phospholipid và các phân tử protein khảm trên đó. Nó có tính bán thấm, cho phép một số chất đi qua và ngăn cản các chất khác, đảm bảo sự ổn định nội môi của tế bào.",
        quiz: {
            question: "Thành phần chính tạo nên khung của màng sinh chất là gì?",
            options: ["Protein", "Cholesterol", "Phospholipid kép", "Carbohydrate"],
            answer: 2
        }
      },
      {
        id: "heart",
        grade: "11",
        title: "Hệ tuần hoàn (Tim)",
        icon: "❤️",
        excerpt: "Cơ quan đẩy máu đi nuôi cơ thể, hoạt động theo chu kỳ co giãn tự động.",
        wiki: "https://vi.wikipedia.org/wiki/Tim",
        details: "Tim người có 4 ngăn, hoạt động nhờ hệ dẫn truyền tim tự động (nút xoang nhĩ). Một chu kỳ tim kéo dài 0.8s bao gồm tâm nhĩ co, tâm thất co và giãn chung.",
        quiz: {
            question: "Nút nào được mệnh danh là 'Máy tạo nhịp tự nhiên' của tim?",
            options: ["Nút xoang nhĩ", "Nút nhĩ thất", "Bó His", "Mạng lưới Purkinje"],
            answer: 0
        }
      },
      {
        id: "dna",
        grade: "12",
        title: "Cấu trúc DNA",
        icon: "🧬",
        excerpt: "Vật chất di truyền ở cấp độ phân tử, lưu trữ thông tin về mọi tính trạng.",
        wiki: "https://vi.wikipedia.org/wiki/DNA",
        details: "DNA là chuỗi xoắn kép gồm hai mạch polynucleotide ngược chiều nhau. Các nucleotide liên kết với nhau theo nguyên tắc bổ sung: A-T, G-C.",
        quiz: {
            question: "Liên kết nào giữ hai mạch DNA lại với nhau?",
            options: ["Liên kết Peptide", "Liên kết Hydro", "Liên kết Cộng hóa trị", "Liên kết Ion"],
            answer: 1
        }
      },
      {
        id: "evolution",
        grade: "12",
        title: "Tiến hóa (Darwin)",
        icon: "🐒",
        excerpt: "Học thuyết về sự biến đổi của các loài qua chọn lọc tự nhiên.",
        wiki: "https://vi.wikipedia.org/wiki/Tiến_hóa",
        details: "Chọn lọc tự nhiên là quá trình giữ lại những biến dị có lợi và đào thải những biến dị có hại, dẫn đến sự thích nghi và hình thành loài mới.",
        quiz: {
            question: "Ai là tác giả của cuốn sách 'Nguồn gốc các loài'?",
            options: ["Lamarck", "Mendel", "Charles Darwin", "Morgan"],
            answer: 2
        }
      }
    ];

    let currentFilter = 'all';

    function initLibrary() {
      const grid = document.getElementById('library-grid');
      grid.innerHTML = '';
      
      const filtered = KNOWLEDGE_BASE.filter(item => currentFilter === 'all' || item.grade === currentFilter);
      
      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'lib-card animate-fadeInUp';
        card.innerHTML = `
          <span class="icon">${item.icon}</span>
          <div style="font-size: 0.7rem; color: #00f2ff; margin-bottom: 0.5rem; text-transform: uppercase;">Lớp ${item.grade}</div>
          <h3>${item.title}</h3>
          <p>${item.excerpt}</p>
        `;
        card.onclick = () => openDetail(item);
        grid.appendChild(card);
      });
    }

    function setFilter(grade) {
      currentFilter = grade;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-grade') === grade);
      });
      initLibrary();
    }

    function openDetail(item) {
      const overlay = document.getElementById('modal-overlay');
      const title = document.getElementById('modal-title');
      const body = document.getElementById('modal-body');
      
      title.innerText = item.title;
      body.innerHTML = `
        <div class="animate-fadeIn">
            <p style="font-size: 1.1rem; line-height: 1.8; color: rgba(255,255,255,0.8);">${item.details}</p>
            <a href="${item.wiki}" target="_blank" class="wiki-btn">
                🌐 Xem thêm trên Wikipedia
            </a>
            
            <div class="quiz-section">
                <h3 style="margin-bottom: 1.5rem; color: #00f2ff;">🧪 Thử thách Trải nghiệm AI</h3>
                <p style="margin-bottom: 1rem; font-size: 0.95rem;">${item.quiz.question}</p>
                <div id="quiz-options">
                    ${item.quiz.options.map((opt, i) => `
                        <button class="quiz-option" onclick="checkAnswer(${i}, ${item.quiz.answer}, this)">${opt}</button>
                    `).join('')}
                </div>
                <div id="quiz-feedback" style="margin-top: 1rem; font-weight: bold; display: none;"></div>
            </div>
        </div>
      `;
      
      overlay.classList.add('open');
    }

    function checkAnswer(selected, correct, btn) {
        const feedback = document.getElementById('quiz-feedback');
        const buttons = document.querySelectorAll('.quiz-option');
        
        buttons.forEach(b => b.disabled = true);
        
        if (selected === correct) {
            btn.classList.add('correct');
            feedback.innerText = "🎉 Chính xác! Bạn nhận được 10 EXP.";
            feedback.style.color = "#10B981";
            if(window.BioAuth?.earnEXP) window.BioAuth.earnEXP(10, 'quiz');
        } else {
            btn.classList.add('wrong');
            buttons[correct].classList.add('correct');
            feedback.innerText = "❌ Tiếc quá, hãy đọc kỹ lại kiến thức phía trên nhé!";
            feedback.style.color = "#EF4444";
        }
        feedback.style.display = "block";
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    function filterLibrary() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const cards = document.querySelectorAll('.lib-card');
        cards.forEach(card => {
            const text = card.innerText.toLowerCase();
            card.style.display = text.includes(q) ? 'block' : 'none';
        });
    }

    window.onload = initLibrary;
  </script>
</body>
</html>
