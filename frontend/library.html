<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thư Viện Sinh Học Thông Minh – Digital BioHospital</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    /* ── Search & Filter ── */
    .search-bar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.5rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0, 242, 255, 0.2);
      border-radius: 999px; margin-bottom: 2rem; transition: all 0.3s;
    }
    .search-bar:focus-within { border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
    .search-bar input { flex:1; background:none; border:none; outline:none; padding: 1rem 0; color: white; font-size: 1rem; }

    .filter-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:2rem; justify-content: center; }
    .filter-btn {
      padding: 0.5rem 1.2rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; cursor:pointer; font-size:0.85rem; color: rgba(255,255,255,0.6); transition: 0.3s;
    }
    .filter-btn.active { background: #00f2ff; color: #000; font-weight: bold; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

    /* ── Grid ── */
    .library-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap:2rem; }
    .lib-card {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 1.5rem; padding: 2rem; cursor: pointer; transition: 0.4s; position: relative; overflow: hidden;
      backdrop-filter: blur(5px);
    }
    .lib-card:hover { transform: translateY(-10px); border-color: #00f2ff; background: rgba(0, 242, 255, 0.05); }
    .lib-card .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .lib-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; color: #00f2ff; }
    .lib-card p { font-size: 0.9rem; color: rgba(255,255,255,0.5); line-height: 1.6; }

    /* ── Modal & Detail ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
      z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
    }
    .modal-overlay.open { display: flex; opacity: 1; }
    .modal-content {
      width: 90vw; max-width: 900px; max-height: 85vh; background: #0a0f18; border: 1px solid rgba(0, 242, 255, 0.2);
      border-radius: 2rem; position: relative; display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 2rem; overflow-y: auto; flex-grow: 1; }

    /* ── Wikipedia Popup ── */
    .wiki-popup-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
        z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
    }
    .wiki-popup-overlay.open { display: flex; opacity: 1; }
    .wiki-popup {
        width: 80vw; max-width: 600px; background: #111; border: 2px solid #00f2ff; border-radius: 1.5rem; padding: 2rem;
        box-shadow: 0 0 50px rgba(0, 242, 255, 0.3); position: relative;
    }

    .wiki-btn {
        background: #fff; color: #000; padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: bold; font-size: 0.85rem;
        display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem; transition: 0.3s; cursor: pointer;
    }
    .wiki-btn:hover { background: #00f2ff; transform: translateY(-2px); }

    /* ── Quiz ── */
    .quiz-section { background: rgba(0, 242, 255, 0.05); border: 1px dashed #00f2ff; border-radius: 1rem; padding: 2rem; margin-top: 2rem; }
    .quiz-option {
        width: 100%; text-align: left; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; transition: 0.2s; color: white;
    }
    .quiz-option:hover { background: rgba(0, 242, 255, 0.1); border-color: #00f2ff; }
    .quiz-option.correct { background: rgba(16, 185, 129, 0.2); border-color: #10B981; }
    .quiz-option.wrong { background: rgba(239, 68, 68, 0.2); border-color: #EF4444; }

  </style>
</head>
<body class="page-enter">

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="navbar-brand">🏥 Digital BioHospital</a>
      <ul class="navbar-nav">
        <li><a href="index.html">Trang chủ</a></li>
        <li><a href="departments.html">Lâm Sàng</a></li>
        <li><a href="metabolism.html">Phòng Lab</a></li>
        <li><a href="library.html" class="active">Thư Viện</a></li>
      </ul>
    </div>
  </nav>

  <main class="container" style="padding-top: 5rem;">
    <div class="page-header text-center">
      <h1>📚 Thư Viện Y Khoa AI</h1>
      <p>Tra cứu kiến thức chuẩn Wikipedia cho mục tiêu học tập A1K50.</p>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Tìm kiếm kiến thức..." oninput="filterLibrary()" />
    </div>

    <div class="filter-tabs">
      <button class="filter-btn active" data-grade="all" onclick="setFilter('all')">Tất cả</button>
      <button class="filter-btn" data-grade="10" onclick="setFilter('10')">Lớp 10</button>
      <button class="filter-btn" data-grade="11" onclick="setFilter('11')">Lớp 11</button>
      <button class="filter-btn" data-grade="12" onclick="setFilter('12')">Lớp 12</button>
    </div>

    <div class="library-grid" id="library-grid"></div>
  </main>

  <!-- Modal Detail -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title" style="color: #00f2ff;">Tiêu đề</h2>
        <button onclick="closeModal()" style="color: #fff; font-size: 1.5rem;">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Wikipedia Popup -->
  <div class="wiki-popup-overlay" id="wiki-popup-overlay">
      <div class="wiki-popup">
          <button onclick="closeWiki()" style="position:absolute; top:1rem; right:1.5rem; color:#fff; font-size:1.5rem;">✕</button>
          <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:1.5rem;">
              <div style="font-size:1.5rem;">🌐</div>
              <h3 style="color:#00f2ff; margin:0;">Wikipedia Tiếng Việt</h3>
          </div>
          <div id="wiki-content-area" style="font-size:0.95rem; line-height:1.7; color:rgba(255,255,255,0.8); max-height:400px; overflow-y:auto; padding-right:1rem;">
              <div style="text-align:center; padding:2rem;">🔍 Đang kết nối dữ liệu...</div>
          </div>
          <div id="wiki-footer" style="margin-top:2rem; text-align:right;"></div>
      </div>
  </div>

  <script src="js/patient.js"></script>
  <script>
    const KNOWLEDGE_BASE = [
      {
        id: "khinquan_phequan",
        grade: "11",
        title: "Khí Quản & Phế Quản",
        icon: "🫁",
        excerpt: "Hệ thống ống dẫn khí đưa oxy vào phổi và loại bỏ CO2.",
        searchTerms: ["Khí quản", "Phế quản"],
        details: "Khí quản là một ống sụn nối hầu và thanh quản với phổi, cho phép không khí đi qua. Nó được lót bằng các tế bào có lông chuyển để lọc bụi bẩn.",
        quiz: {
            question: "Chức năng chính của các lông chuyển trong khí quản là gì?",
            options: ["Trao đổi khí", "Lọc bụi và vi khuẩn", "Tạo ra âm thanh", "Sưởi ấm không khí"],
            answer: 1
        }
      },
      {
        id: "mitochondria",
        grade: "10",
        title: "Ti thể (Mitochondria)",
        icon: "⚡",
        excerpt: "Nhà máy năng lượng của tế bào, nơi sản sinh ATP.",
        searchTerms: ["Ti thể"],
        details: "Ti thể là bào quan thực hiện hô hấp tế bào, chuyển hóa glucose thành ATP.",
        quiz: {
            question: "Bào quan nào được mệnh danh là 'nhà máy năng lượng'?",
            options: ["Nhân", "Lưới nội chất", "Ti thể", "Bộ máy Golgi"],
            answer: 2
        }
      },
      {
        id: "heart",
        grade: "11",
        title: "Hệ tuần hoàn (Tim)",
        icon: "❤️",
        excerpt: "Cơ quan đẩy máu đi nuôi cơ thể.",
        searchTerms: ["Tim"],
        details: "Tim người hoạt động không mệt mỏi nhờ hệ dẫn truyền tim tự động.",
        quiz: {
            question: "Nút xoang nhĩ nằm ở đâu?",
            options: ["Tâm thất trái", "Tâm thất phải", "Tâm nhĩ phải", "Tâm nhĩ trái"],
            answer: 2
        }
      }
    ];

    let currentFilter = 'all';

    function initLibrary() {
      const grid = document.getElementById('library-grid');
      grid.innerHTML = '';
      KNOWLEDGE_BASE.filter(i => currentFilter === 'all' || i.grade === currentFilter).forEach(item => {
        const card = document.createElement('div');
        card.className = 'lib-card animate-fadeInUp';
        card.innerHTML = `<span class="icon">${item.icon}</span><h3>${item.title}</h3><p>${item.excerpt}</p>`;
        card.onclick = () => openDetail(item);
        grid.appendChild(card);
      });
    }

    function openDetail(item) {
      const overlay = document.getElementById('modal-overlay');
      document.getElementById('modal-title').innerText = item.title;
      document.getElementById('modal-body').innerHTML = `
        <p style="font-size: 1.1rem; line-height: 1.8;">${item.details}</p>
        <button onclick="searchWikipedia('${item.searchTerms[0]}')" class="wiki-btn">🌐 Tra cứu chuyên sâu trên Wikipedia</button>
        <div class="quiz-section">
            <h3>🧪 Thử thách AI</h3>
            <p>${item.quiz.question}</p>
            ${item.quiz.options.map((o, i) => `<button class="quiz-option" onclick="checkAnswer(${i}, ${item.quiz.answer}, this)">${o}</button>`).join('')}
            <div id="quiz-feedback" style="margin-top:1rem; font-weight:bold;"></div>
        </div>
      `;
      overlay.classList.add('open');
    }

    async function searchWikipedia(term) {
        const overlay = document.getElementById('wiki-popup-overlay');
        const content = document.getElementById('wiki-content-area');
        const footer = document.getElementById('wiki-footer');
        
        overlay.classList.add('open');
        content.innerHTML = `<div style="text-align:center; padding:2rem;">🔍 Đang tìm bài viết cho "<strong>${term}</strong>"...</div>`;
        footer.innerHTML = '';

        try {
            // Thử lấy extract trực tiếp
            const response = await fetch(`https://vi.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&format=json&origin=*&titles=${encodeURIComponent(term)}`);
            const data = await response.json();
            const pages = data.query.pages;
            const pageId = Object.keys(pages)[0];

            if (pageId === "-1") {
                // Nếu không thấy, thử tìm kiếm (Search API)
                content.innerHTML = `<div style="color:#EF4444; margin-bottom:1rem;">⚠️ Không tìm thấy bài viết chính xác cho "<strong>${term}</strong>".</div>
                                     <p>Hệ thống AI đang thử tìm các kết quả liên quan...</p>`;
                
                const searchRes = await fetch(`https://vi.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*`);
                const searchData = await searchRes.json();
                const results = searchData.query.search;

                if (results && results.length > 0) {
                    content.innerHTML = `<p style="margin-bottom:1rem;">Các bài viết liên quan được tìm thấy:</p>`;
                    results.forEach(res => {
                        const item = document.createElement('div');
                        item.style.background = 'rgba(255,255,255,0.05)';
                        item.style.padding = '1rem';
                        item.style.borderRadius = '0.5rem';
                        item.style.marginBottom = '0.5rem';
                        item.style.cursor = 'pointer';
                        item.innerHTML = `<strong style="color:#00f2ff;">${res.title}</strong><br/><span style="font-size:0.8rem; opacity:0.7;">${res.snippet}...</span>`;
                        item.onclick = () => searchWikipedia(res.title);
                        content.appendChild(item);
                    });
                } else {
                    content.innerHTML = `<div style="text-align:center; padding:2rem;">
                        <span style="font-size:3rem;">😕</span><br/>
                        Rất tiếc, không tìm thấy bài viết nào phù hợp trên Wikipedia.<br/>
                        Hãy thử tìm kiếm với từ khóa ngắn gọn hơn (VD: "Khí quản").
                    </div>`;
                }
            } else {
                const page = pages[pageId];
                content.innerHTML = `<h4>${page.title}</h4><p>${page.extract}</p>`;
                footer.innerHTML = `<a href="https://vi.wikipedia.org/wiki/${encodeURIComponent(page.title)}" target="_blank" class="wiki-btn">🔗 Đọc toàn bộ bài viết</a>`;
            }
        } catch (err) {
            content.innerHTML = `<p style="color:#EF4444;">Lỗi kết nối: ${err.message}. Hãy kiểm tra internet.</p>`;
        }
    }

    function checkAnswer(s, c, btn) {
        const f = document.getElementById('quiz-feedback');
        if (s === c) {
            btn.classList.add('correct');
            f.innerText = "🎉 Chính xác!"; f.style.color = "#10B981";
            if(window.BioAuth?.earnEXP) window.BioAuth.earnEXP(10, 'quiz');
        } else {
            btn.classList.add('wrong');
            f.innerText = "❌ Chưa đúng rồi!"; f.style.color = "#EF4444";
        }
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
    function closeWiki() { document.getElementById('wiki-popup-overlay').classList.remove('open'); }
    function setFilter(g) { currentFilter = g; initLibrary(); }

    window.onload = initLibrary;
  </script>
</body>
</html>
